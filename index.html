# index.html

```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="left">
        <h1>Tip Calculator</h1>

        <div class="field">
          <label>Bill Amount ($)</label>
          <input type="number" id="bill" placeholder="Enter amount">
          <p class="error" id="billError"></p>
        </div>

        <div class="field">
          <label>Tip Percentage</label>

          <div class="tip-buttons">
            <button class="tip-btn active" data-tip="10">10%</button>
            <button class="tip-btn" data-tip="15">15%</button>
            <button class="tip-btn" data-tip="20">20%</button>
          </div>

          <input type="number" id="customTip" placeholder="Custom tip %">
          <p class="error" id="tipError"></p>
        </div>

        <div class="field">
          <label>Number of People</label>
          <input type="number" id="people" value="1">
          <p class="error" id="peopleError"></p>
        </div>

        <button class="reset" id="reset">Reset</button>
      </div>

      <div class="right">
        <div class="result-box">
          <p>Total Tip</p>
          <h2 id="tipAmount">$0.00</h2>
        </div>

        <div class="result-box">
          <p>Grand Total</p>
          <h2 id="total">$0.00</h2>
        </div>

        <div class="result-box">
          <p>Per Person</p>
          <h2 id="perPerson">$0.00</h2>
        </div>
      </div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
```
